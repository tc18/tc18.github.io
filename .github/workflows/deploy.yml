name: Deploy to GitHub Pages
on:
  push:
    branches: [ dev ] # Replace 'source' with your development branch name

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install and Build
        run: |
          cd vite
          npm install
          npm run build
          cd ..

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: vite/dist
          branch: main # For username.github.io, the build goes here